version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_biotwin
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
      - ./ollama_init.sh:/ollama_init.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    entrypoint: /bin/bash -c "ollama serve & sleep 5 && bash /ollama_init.sh"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 10s
      timeout: 5s
      retries: 5

  biotwin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biotwin_app
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - all2md
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - LLM__Provider=Ollama
      - LLM__BaseUrl=http://ollama:11434
      - LLM__Model=gemma4:e2b
      - LLM__EmbeddingModel=nomic-embed-text
      - All2MD__ApiUrl=http://all2md:8000
    restart: unless-stopped

  all2md:
    build:
      context: ../All2MD
      dockerfile: Dockerfile
    container_name: all2md_service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_storage:
